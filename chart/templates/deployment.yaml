apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "okdp-server.fullname" . }}
  labels:
    {{- include "okdp-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "okdp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Environment variables only refresh on pod restart: roll the
        # Deployment whenever the ConfigMap content changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "okdp-server.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "okdp-server.fullname" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "okdp-server.fullname" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
