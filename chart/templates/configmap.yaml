apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "okdp-server.fullname" . }}
  labels:
    {{- include "okdp-server.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.service.port | quote }}
  PLATFORM_NAMESPACE: {{ .Values.configuration.platformNamespace | quote }}
  KUBOCD_NAMESPACE: {{ .Values.configuration.kubocdNamespace | quote }}
  CONTEXT_NAME: {{ .Values.configuration.contextName | quote }}
  CONTEXT_NAMESPACE: {{ .Values.configuration.contextNamespace | quote }}
  ALLOWED_ORIGINS: {{ .Values.configuration.allowedOrigins | quote }}
  LOG_LEVEL: {{ .Values.configuration.logLevel | quote }}
  RELEASE_INTERVAL: {{ .Values.configuration.releaseInterval | quote }}
  RELEASE_TIMEOUT: {{ .Values.configuration.releaseTimeout | quote }}
